version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: rupeeradar
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: rupeeradar_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rupeeradar"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://rupeeradar:secure_password@postgres:5432/rupeeradar_db
      - REDIS_URL=redis://redis:6379/0
      - SESSION_TTL_MINUTES=60
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - ENABLE_LLM=${ENABLE_LLM:-false}
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
